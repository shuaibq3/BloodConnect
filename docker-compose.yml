version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bloodconnect-db
    environment:
      POSTGRES_USER: bloodconnect
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bloodconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: bloodconnect-server
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres
      - DB_NAME=bloodconnect
      - DB_USER=bloodconnect
      - DB_PASSWORD=password
      - DB_PORT=5432
      - PORT=3000
    depends_on:
      - postgres

volumes:
  postgres_data:
