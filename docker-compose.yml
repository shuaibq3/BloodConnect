version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bloodconnect-db
    environment:
      POSTGRES_USER: bloodconnect
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bloodconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
